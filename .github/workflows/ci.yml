# Tests + lint on every push/PR. Two jobs: Linux proves the cross-platform core + CLI (and the
# FileStore credential backend that is only *wired* off macOS), macOS proves the full workspace
# including the Tauri app and the frontend. The `--ignored` real-data E2E (real Keychain, real logs)
# can't run in CI — they need a logged-in `claude` and live state — so CI runs the hermetic suite.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux-core-cli:
    name: Linux · core + CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # The platform-agnostic crates. The Tauri app is macOS-only and needs GUI system libs; core +
      # CLI + the uniffi FFI all build cross-platform, and this exercises the non-macOS `FileStore`
      # default. (The FFI's hermetic tests don't need macOS — they never poll or open a GUI.)
      - name: Test
        run: cargo test -p vibeproxy-core -p vibeproxy-cli -p vibeproxy-ffi
      - name: Clippy
        run: cargo clippy -p vibeproxy-core -p vibeproxy-cli -p vibeproxy-ffi --all-targets -- -D warnings

  macos-full:
    name: macOS · full workspace + frontend
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install JS deps
        run: pnpm install
      - name: Typecheck
        run: pnpm check
      - name: Frontend unit tests
        run: pnpm test
      # The Tauri app crate embeds the built frontend (frontendDist = ../build), so build it first.
      - name: Build frontend
        run: pnpm build
      - name: Test (whole workspace)
        run: cargo test --workspace
      - name: Clippy (whole workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings
      # The native macOS app builds with the Command Line Tools Swift toolchain (no Xcode). This
      # compiles it end to end — Rust FFI dylib, generated Swift bindings, and the SwiftUI sources —
      # so a break in any of them fails CI.
      - name: Build macOS app
        run: ./apps/macos/build.sh
