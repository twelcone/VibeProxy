name: release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build an unsigned macOS
# bundle and attach it to a draft GitHub Release.
on:
  push:
    tags:
      - "v*"

jobs:
  macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build and release (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "VibeProxy ${{ github.ref_name }}"
          releaseBody: |
            ## What's new in 0.2.0

            - **Usage Analytics** — a dedicated window with per-account / model / project breakdowns,
              trend and cache charts, filters, and CSV export, parsed from Claude Code's local logs.
            - **Menubar panel** — the tray now opens the real UI anchored under the icon, usage-first,
              instead of a plain text menu.
            - **First-run setup** — installs the shell integration for you, so switching actually
              reaches your terminals.
            - **Switch running sessions** (opt-in, off by default) — moves a live session to another
              account by swapping its credentials; the displaced account is snapshotted first.
            - Account identity is now re-checked over time, so a login change made outside VibeProxy
              is picked up instead of silently breaking auto-switch.

            ---
            Unsigned build. First launch: System Settings → Privacy & Security → **Open Anyway**
            (or `xattr -dr com.apple.quarantine /Applications/VibeProxy.app`). See the README.
          releaseDraft: true
          prerelease: false
